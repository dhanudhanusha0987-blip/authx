<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Behavioral Verification | AuthX</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

* { box-sizing: border-box; }
body {
  margin: 0;
  background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
  font-family: 'Poppins', sans-serif;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  color: #fff;
  justify-content: center;
  align-items: center;
  padding: 1rem;
  text-align: center;
}

h2 {
  font-weight: 600;
  font-size: 2.5rem;
  margin-bottom: 0.5rem;
}

p.description {
  font-size: 1.1rem;
  margin-bottom: 2rem;
  opacity: 0.9;
}

.loader {
  border: 5px solid rgba(255,255,255,0.3);
  border-top: 5px solid #fff;
  border-radius: 50%;
  width: 56px;
  height: 56px;
  animation: spin 1.1s linear infinite;
  margin-bottom: 1.5rem;
}

@keyframes spin { to { transform: rotate(360deg); } }

#result {
  margin-top: 1.5rem;
  font-size: 1.4rem;
  font-weight: 600;
  padding: 1rem 2rem;
  border-radius: 10px;
  min-width: 320px;
}

.pass {
  background-color: #38ef7d;
  color: #065f46;
}

.fail {
  background-color: #f87171;
  color: #7f1d1d;
}

.action-btn {
  margin-top: 1.5rem;
  padding: 0.7rem 1.8rem;
  font-size: 1rem;
  font-weight: 600;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.try-btn {
  background-color: #fff;
  color: #f87171;
}

.verify-btn {
  background-color: #fff;
  color: #38ef7d;
}
</style>
</head>

<body>

<h2>Behavioral Verification</h2>
<p class="description">Interact naturally on the page for a few seconds…</p>

<div class="loader" id="loader"></div>
<div id="result"></div>

<button id="tryBtn" class="action-btn try-btn" style="display:none;">Try Again</button>
<button id="verifyBtn" class="action-btn verify-btn" style="display:none;">Continue</button>

<script>
let interacted = false;
const loader = document.getElementById('loader');
const result = document.getElementById('result');
const tryBtn = document.getElementById('tryBtn');
const verifyBtn = document.getElementById('verifyBtn');

function showResult(passed) {
  loader.style.display = 'none';
  if (passed) {
    result.textContent = 'Behavior verified successfully ✔';
    result.className = 'pass';
    verifyBtn.style.display = 'inline-block';
  } else {
    result.textContent = 'Verification failed. Please try again.';
    result.className = 'fail';
    tryBtn.style.display = 'inline-block';
  }
}

setTimeout(() => showResult(interacted), 5000);

// Human behavior signals
['mousemove','scroll','click','keydown'].forEach(evt => {
  window.addEventListener(evt, () => interacted = true);
});

tryBtn.onclick = () => location.reload();
verifyBtn.onclick = () => window.location.href = 'user_files.php';
</script>

</body>
</html>
